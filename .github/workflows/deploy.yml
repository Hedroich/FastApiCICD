name: Deploy FastAPI

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Pull latest changes
        run: |
          cd /home/pavel/Python/FastApi
          git pull origin main

      - name: Install dependencies
        run: |
          cd /home/pavel/Python/FastApi
          ./venv/bin/pip install -r requirements.txt

      - name: Run tests
        run: |
          cd /home/pavel/Python/FastApi
          pytest tests.py

      - name: Restart FastAPI
        run: sudo systemctl restart fastapi
